<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McBride Holdings</title>
<style>
  :root {
    --ink: #111111;
    --paper: #f4f4f2;
    --muted: #6b6b68;
    --line: #d6d6d2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    -webkit-font-smoothing: antialiased;
  }

  main {
    width: 100%;
    max-width: 560px;
    text-align: center;
    animation: rise 1s ease both;
  }

  .eyebrow {
    font-size: 0.72rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.6rem;
  }

  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-weight: 500;
    font-size: clamp(2.6rem, 9vw, 4.4rem);
    line-height: 1.05;
    letter-spacing: -0.01em;
  }

  .rule {
    width: 48px;
    height: 1px;
    background: var(--line);
    margin: 2.2rem auto;
  }

  .contact {
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
    font-size: 1.05rem;
    letter-spacing: 0.01em;
  }

  .contact a {
    color: var(--ink);
    text-decoration: none;
    display: inline-block;
    position: relative;
    padding-bottom: 2px;
    transition: opacity 0.25s ease;
  }

  .contact a::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: 0;
    width: 0;
    height: 1px;
    background: var(--ink);
    transition: width 0.3s ease, left 0.3s ease;
  }

  .contact a:hover::after,
  .contact a:focus-visible::after {
    width: 100%;
    left: 0;
  }

  .contact a:focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 4px;
    border-radius: 2px;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    main { animation: none; }
    .contact a, .contact a::after { transition: none; }
  }
</style>
</head>
<body>
  <main>
    <p class="eyebrow">Real Estate Investments</p>
    <h1>McBride Holdings</h1>
    <div class="rule"></div>
    <div class="contact">
      <a href="tel:+18017034009">801-703-4009</a>
      <a href="mailto:nate@mcbrideholdings.co">nate@mcbrideholdings.co</a>
    </div>
  </main>
</body>
</html>
